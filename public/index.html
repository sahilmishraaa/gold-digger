<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="GoldDigger - Invest in gold with ease. Get live prices and make informed decisions.">
    <link rel="stylesheet" href="/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&display=swap"
        rel="stylesheet">
    <title>GoldDigger</title>
</head>

<body>
    <main>
        <h1 class="title">GoldDigger</h1>
        <img src="/images/gold.png" alt="gold bars and nuggets">
        <section class="price-info-container">
            <p>₹<span id="price-display" class="price" aria-live="assertive">----.--</span> / gm*</p>
            <p id="connection-status" class="status" aria-live="polite">Live Price 🟢</p>
        </section>
        <form>
            <label for="investment-amount">Amount to invest</label>
            <div class="input-container">
                <div class="currency">₹</div>
                <input type="number" id="investment-amount" placeholder="100.00" required>
            </div>
            <button id="invest-btn" class="invest-btn" aria-label="Invest in gold now">Invest Now!</button>
        </form>
        <!-- This dialog opens after a successful purchase -->
        <dialog class="outputs" id="summary-dialog" role="dialog" aria-labelledby="dialog-title" aria-describedby="investment-summary"
            lang="en">
            <h2>Investment Successful🪙</h2>
            <p>Amount Invested: ₹<span id="amount"></span></p>
            <p>Gold Price: ₹<span id="price"></span> / gm</p>
            <p>Gold Bought: <span id="gold"></span> gm</p>
            <p>Purchased At: <span id="time"></span></p>
            <button id="close-dialog">OK</button>
        </dialog>
        <p class="footnote">* 1gm = 1 gram of 24 Carat Gold</p>
    </main>
    <script type="module" src="index.js"></script>
</body>

</html>
